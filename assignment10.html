
<html>
<head>
    <title> Registration Form</title>
</head>

<body bgcolor="#F0F8FF">

<center>
    <h1> Registration Form</h1>
</center>

<form action="success.html">

<center>
<div style="border: 2px solid black; width: 400px; padding: 20px;">



<label>First Name:</label><br>
<input type="text"  name="fname" >
<br><br>

<label>Middle Name:</label><br>
<input type="text" name="mname">
<br><br>

<label>Last Name:</label><br>
<input type="text" name="lname">
<br><br>

<label >Address:</label><br>
<textarea ="address" name="address" rows="3" cols="30"></textarea>
<br><br>

<label>Mobile Number:</label><br>
<input type="tel"  name="mobile">
<br><br>

<label >College Name:</label><br>
<select ="college" name="college">
    <option value="">Select College</option>
    <option>Modern College</option>
    <option>DY Patil College</option>
    <option>MIT College</option>
    <option>COEP College</option>
</select>
<br><br>

<label>Branch Name:</label><br>
<select ="branch" name="branch" >
    <option value="">Select Branch</option>
    <option>Computer Science</option>
    <option>Information Technology</option>
    <option>Mechanical Engineering</option>
    <option>Electronics Engineering</option>
    <option>Civil Engineering</option>
</select>
<br><br>

<input type="submit" value="Register">


</center>

</form>

</body>
</html>
